# @format

services:
  agent-api:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - '8000:8000'
    env_file:
      - .env
    environment:
      - APP_ENV=production
      - LOG_LEVEL=INFO
      - QDRANT_URL=http://qdrant:6333
    depends_on:
      qdrant:
        condition: service_started
    healthcheck:
      test: [ 'CMD', 'curl', '-f', 'http://localhost:8000/health' ]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped

  ingestion-worker:
    build:
      context: .
      dockerfile: Dockerfile.ml
    env_file:
      - .env
    environment:
      - APP_ENV=production
      - LOG_LEVEL=INFO
      - QDRANT_URL=http://qdrant:6333
    volumes:
      # Sync local code changes instantly
      - ./app:/app/app
    depends_on:
      qdrant:
        condition: service_started
    # A dummy command to keep the container alive so you can execute scripts inside it
    command: tail -f /dev/null

  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"
      - "6334:6334" # gRPC
    volumes:
      - qdrant_data:/qdrant/storage

volumes:
  qdrant_data:
